<div class="home-container">

    <section class="hero-section">

        <div class="hero-slides">

            <!-- SLIDE 1 -->
            <div class="hero-slide">
                <img src="/burger.jpg" alt="Burger">
            </div>

            <!-- SLIDE 2 -->
            <div class="hero-slide">
                <img src="/pasta.jpg" alt="Pasta">
            </div>

            <!-- SLIDE 3 -->
            <div class="hero-slide">
                <img src="/chocolate.jpg" alt="Cake">
            </div>

            <!-- SLIDE 4 -->
            <div class="hero-slide">
                <img src="/greek.jpg" alt="greek">
            </div>

        </div>

        <!-- EXISTING HERO CONTENT -->
        <div class="hero-content">

            <h1>Welcome to My Recipe Book</h1>

            <p>
                Discover tasty recipes, cooking ideas,
                and easy meals for every occasion.
            </p>

            <a routerLink="/recipes">
                <button>View Recipes</button>
            </a>

        </div>

    </section>


    <!-- FEATURED SECTION -->
    <section class="featured-section">

        <h2>Trending Recipes</h2>

        <div class="recipe-cards">

            <!-- CARD 1 -->
            <div class="card">
                <img [src]="recipeList[0].image" alt="{{ recipeList[0].name }}">
                <div class="card-content">

                    <h3>{{recipeList[0].name}}</h3>
                    <p>{{recipeList[0].description}}</p>

                </div>

            </div>

            <!-- CARD 2 -->
            <div class="card">

                <img [src]="recipeList[1].image" alt="{{ recipeList[1].name }}">
                <div class="card-content">

                    <h3>{{recipeList[1].name}}</h3>
                    <p>{{recipeList[1].description}}</p>

                </div>

            </div>

            <!-- CARD 3 -->
            <div class="card">

                <img [src]="recipeList[5].image" alt="{{ recipeList[5].name }}">
                <div class="card-content">

                    <h3>{{recipeList[5].name}}</h3>
                    <p>{{recipeList[5].description}}</p>

                </div>

            </div>

        </div>

    </section>

</div>
